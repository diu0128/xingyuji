        // 显示今日寿星
        function showBirthday() {
            const today = new Date();
            const month = today.getMonth() + 1;
            const day = today.getDate();
            
            const birthdayChars = charactersData.filter(char => {
                if (!char.birthday) return false;
                const bMonth = typeof char.birthday === 'object' ? char.birthday.month : parseInt(char.birthday.split('月')[0]);
                const bDay = typeof char.birthday === 'object' ? char.birthday.day : parseInt(char.birthday.split('月')[1].replace('日', ''));
                return bMonth === month && bDay === day;
            });
            
            const birthdayList = document.getElementById('birthdayList');
            if (birthdayChars.length > 0) {
                birthdayList.innerHTML = birthdayChars.map(char => {
                    const name = typeof char.name === 'object' ? char.name.cn : char.name;
                    return `<span style="display:inline-block;margin:5px;padding:10px 20px;background:rgba(255,255,255,0.2);border-radius:20px;cursor:pointer;" onclick="goToCharacter('${char.id}')">${char.avatar} ${name}</span>`;
                }).join('');
            } else {
                birthdayList.innerHTML = '<p>今天没有寿星，但你可以探索其他角色！🎉</p>';
            }
        }

                                onmouseout="this.style.background='white'"
                                onclick="goToCharacter('${char.id}')">
                                <strong>${char.avatar} ${name}</strong>
                                <span style="color:#666;font-size:0.9em;"> - ${gameName} · ${char.unit}</span>
                            </div>`;
                }).join('');
            } else {
                results.innerHTML = '<p style="color:#999;text-align:center;">未找到匹配的角色</p>';
            }
        }

        // 跳转到角色详情页
        function goToCharacter(charId) {
            const char = charactersData.find(c => c.id === charId);
            if (char) {
                showGame(char.game);
                setTimeout(() => {
                    showDetail(charId);
                }, 100);
            }
        }

        function showGame(game) {
            currentGame = game;
            const titles = { ensemble: '🎭 偶像梦幻祭', genshin: '⚔️ 原神', aotu: '🎮 凹凸世界', naruto: '🥷 火影忍者', grave: '📚 盗墓笔记', honor: '👑 王者荣耀', identity: '🎭 第五人格', jojo: '💫 JOJO', jujutsu: '✨ 咒术回战' };
            document.getElementById('gameTitle').textContent = titles[game];
            
            currentCharacters = charactersData.filter(c => c.game === game);
            renderCharacters();
            
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';
            document.getElementById('detailPage').style.display = 'none';
            document.getElementById('quizPage').style.display = 'none';
        }

        function renderCharacters() {
            const list = document.getElementById('characterList');
            const groupedChars = {};
            
            currentCharacters.forEach(c => {
                if (!groupedChars[c.unit]) {
                    groupedChars[c.unit] = [];
                }
                groupedChars[c.unit].push(c);
            });
            
            let html = '';
            Object.keys(groupedChars).forEach(unit => {
                html += `<div class="unit-section">
                    <div class="unit-title">${unit}</div>
                    <div class="character-list">
                        ${groupedChars[unit].map(c => `
                            <div class="character-card" onclick="showDetail('${c.id}')">
                                <div class="avatar">${c.avatar}</div>
                                <div class="name">${typeof c.name === 'object' ? c.name.cn : c.name}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            
            list.innerHTML = html;
        }

        function showDetail(id) {
            const char = charactersData.find(c => c.id === id);
            const charName = typeof char.name === 'object' ? char.name.cn : char.name;
            
            let detailHTML = `
                <div class="detail-header">
                    <div class="detail-avatar">${char.avatar}</div>
                    <div>
                        <h2>${charName}</h2>
                        <p><strong>阵营：</strong>${char.unit}</p>
                    </div>
                </div>
                <div style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px;border-radius:10px;font-style:italic;margin:20px 0;">
                    "${char.signature}"
                </div>
                <p>${char.description}</p>
            `;
            
            if (char.birthday) {
                detailHTML += `<p><strong>生日：</strong>${char.birthday.month}月${char.birthday.day}日</p>`;
            }
            if (char.bloodType) {
                detailHTML += `<p><strong>血型：</strong>${char.bloodType}</p>`;
            }
            if (char.age) {
                detailHTML += `<p><strong>年龄：</strong>${char.age}</p>`;
            }
            if (char.height) {
                detailHTML += `<p><strong>身高：</strong>${char.height}cm</p>`;
            }
            if (char.weight) {
                detailHTML += `<p><strong>体重：</strong>${char.weight}kg</p>`;
            }
            if (char.cv) {
                detailHTML += `<p><strong>声优：</strong>${char.cv}</p>`;
            }
            
            document.getElementById('detailContent').innerHTML = detailHTML;
            document.getElementById('gamePage').style.display = 'none';
            document.getElementById('detailPage').style.display = 'block';
        }

        function backToList() {
            document.getElementById('detailPage').style.display = 'none';
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';
        }

        function startQuiz() {
            switch(currentGame) {
                case 'ensemble':
                    quizQuestions = ensembleQuiz;
                    break;
                case 'genshin':
                    quizQuestions = genshinQuiz;
                    break;
                case 'aotu':
                    quizQuestions = aotuQuiz;
                    break;
                case 'naruto':
                    quizQuestions = narutoQuiz;
                    break;
                default:
                    quizQuestions = genshinQuiz;
            }
            userAnswers = [];
            currentQuestion = 0;
            renderQuizQuestion();
            document.getElementById('gamePage').style.display = 'none';
            document.getElementById('quizPage').style.display = 'block';
        }

        function renderQuizQuestion() {
            const q = quizQuestions[currentQuestion];
            const content = document.getElementById('quizContent');
            
            content.innerHTML = `
                <div class="quiz-container">
                    <p style="color:#666;">第 ${currentQuestion + 1} / ${quizQuestions.length} 题</p>
                    <div class="quiz-question">${q}</div>
                    <div class="scale-container">
                        <div class="scale-label">最不符合</div>
                        ${[1,2,3,4,5,6,7,8,9].map(i => `
                            <button class="scale-btn ${userAnswers[currentQuestion] === i ? 'selected' : ''}" 
                                onclick="selectAnswer(${i})">${i}</button>
                        `).join('')}
                        <div class="scale-label">最符合</div>
                    </div>
                    <button class="next-btn" onclick="nextQuestion()" ${userAnswers[currentQuestion] === undefined ? 'disabled' : ''}>
                        ${currentQuestion < quizQuestions.length - 1 ? '下一题 →' : '查看结果'}
                    </button>
                </div>
            `;
        }

        function selectAnswer(value) {
            userAnswers[currentQuestion] = value;
            renderQuizQuestion();
        }

        function nextQuestion() {
            if (userAnswers[currentQuestion] === undefined) return;
            
            if (currentQuestion < quizQuestions.length - 1) {
                currentQuestion++;
                renderQuizQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const chars = currentCharacters.filter(c => c.quizAnswers && c.quizAnswers.length >= quizQuestions.length);
            const maxDiff = 8 * quizQuestions.length;
            
            const scores = chars.map(c => {
                let diff = 0;
                for (let i = 0; i < quizQuestions.length; i++) {
                    diff += Math.abs(userAnswers[i] - c.quizAnswers[i]);
                }
                return { char: c, score: 100 - (diff / maxDiff * 100) };
            });
            
            scores.sort((a, b) => b.score - a.score);
            
            const topMatch = scores[0];
            const charName = typeof topMatch.char.name === 'object' ? topMatch.char.name.cn : topMatch.char.name;
            
            document.getElementById('quizContent').innerHTML = `
                <h2 style="text-align:center;">✨ 共鸣测试结果 ✨</h2>
                <div class="result-card" style="text-align:center;">
                    <div class="result-rank">✨</div>
                    <div class="result-info">
                        <div class="result-name">${topMatch.char.avatar} ${charName}</div>
                        <div>${topMatch.char.unit}</div>
                    </div>
                    <div class="result-score">${topMatch.score.toFixed(1)}%</div>
                </div>
                <button class="next-btn" onclick="backToList()" style="width:100%;margin-top:20px;">
                    返回列表
                </button>
            `;
        }
    </script>
</body>
</html>
